name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          NO_KOKORO: "1"

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write # OIDC: npm trusted publishing (no NPM_TOKEN) + automatic provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest # OIDC trusted publishing requires npm >= 11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # No NODE_AUTH_TOKEN: authenticated via GitHub OIDC (configure the trusted
      # publisher on the npm package settings → repo + this workflow filename).
      # Provenance is emitted automatically under trusted publishing.
      - name: Publish
        run: npm publish
